<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sondage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🟢 Sondage</h1>

  <div id="createView">

    <label>Titre du sondage</label>
    <input type="text" id="titre" placeholder="Ex : Repas famille">

    <label>Ajouter une date</label>
    <div class="row">
      <input type="date" id="dateInput">
      <button onclick="ajouterDate()">Ajouter</button>
    </div>

    <div id="datesList"></div>

    <label>Emails des invités</label>
    <textarea id="emails" placeholder="email1@gmail.com, email2@gmail.com"></textarea>

    <button class="mainBtn" onclick="creerSondage()">Créer le sondage</button>

    <div id="resultBox" class="hidden">
      <h3>✅ Sondage créé</h3>

      <textarea id="lienSondage" readonly></textarea>

      <button onclick="copierLien()">📋 Copier le lien</button>

      <button onclick="envoyerMail()">📧 Envoyer les invitations</button>
    </div>

  </div>

  <div id="voteView" class="hidden">

    <h2 id="voteTitle"></h2>

    <label>Votre prénom</label>
    <input type="text" id="nom">

    <div id="voteOptions"></div>

    <button class="mainBtn" onclick="envoyerVote()">Valider</button>

    <h3>📊 Résultats</h3>

    <table>
      <thead>
        <tr id="tableHead">
          <th>Participant</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
