<!DOCTYPE html>
            <button class="btn btn-add" onclick="ajouterDate()">➕ Ajouter</button>
        </div>

        <div id="dates-list"></div>

        <label>Partager le lien du sondage :</label>

        <p style="margin-top:0; color:#666;">
            Copiez le lien puis envoyez-le par Outlook, Gmail, WhatsApp ou SMS.
        </p>

        <button class="btn" onclick="genererSondage()">
            Créer le sondage
        </button>

        <div id="result-zone-create" class="hidden">

            <strong class="success-text">
                ✅ Votre sondage est prêt — copiez le lien ou envoyez-le par mail
            </strong>

            <textarea id="text-to-copy-create" readonly></textarea>

            <button class="btn btn-add" onclick="copierTexte()">
                📋 Copier le lien
            </button>

            <button class="btn btn-mail" onclick="ouvrirMail()">
                📧 Ouvrir votre mail
            </button>

        </div>

    </div>

    <div id="view-vote" class="hidden">

        <h2 id="poll-title">Sondage</h2>

        <label>Votre prénom :</label>
        <input type="text" id="voter-name" placeholder="Ex : Marie">

        <label>Choisissez vos disponibilités :</label>

        <div id="options-container"></div>

        <button class="btn btn-add" onclick="envoyerVote()">
            📨 Valider mon vote
        </button>

        <div class="table-zone">

            <h3>📊 Réponses</h3>

            <table>
                <thead>
                    <tr id="table-header">
                        <th>Participants</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>

        </div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
